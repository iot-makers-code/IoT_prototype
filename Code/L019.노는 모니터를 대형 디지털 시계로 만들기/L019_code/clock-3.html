<html>
<body>
<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
<div id="clock" style="font-size:20vw;">11:11:11</div>
</div>
</body>
<script>
setInterval(function() {
   d = new Date()
   clock.innerText
      = d.toTimeString().substring(0,8)
}, 1000)
</script>
</html>
