<html>
<body>
<div id="clock" 
     style="position:fixed;top:50%;left:50%;
           transform:translate(-50%,-50%);
           text-align:center;
           font-size:20vw;">
</div>
</body>
<script>
setInterval(function() {
   clock.innerText
      = (new Date()).toTimeString().substring(0,8)
}, 1000)
</script>
</html>
