<!DOCTYPE HTML>
<html lang="kr">
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta http-equiv='Content-Type' content='text/html; charset=UTF-8'/>
    <title>환경정보</title>
    <style>
    .vcell {
        border: 3px solid gold; 
        text-align:center;
        background-color:yellow;
        display: inline-block; 
        width:12em; 
        height:12em;
        margin:3px; 
        padding:3px;  
        color:yellow;
    }
</style>    
</head>
<body >
    <div id="cells" style='width:100%;text-align:center;'></div>
    <div style='font-size:0.8em;width:100%;text-align:center;'>

</body>
<script>
    list ="192.168.200.117"+"\t"
         +"192.168.200.119"+"\t"
         +"192.168.200.120"+"\t"
         +"192.168.200.121"+"\t"
         +"192.168.200.122"+"\t"
         +"192.168.10.125" +"\t"
         +"192.168.10.100" +"\t"
         +"192.168.10.104"

    hosts=list.split("\t");
    cells = document.getElementById("cells")
    cells.innerHTML=""
    hosts.forEach(
        function(item, index, arr){
            iframe = document.createElement('iframe')
            iframe.classList.add("vcell")
            iframe.src="http://"+item+"/info.html"
            document.getElementById("cells").append(iframe);
        }
    );
</script>
</html>
